version: "3.9"

services:
  web-gateway:
    image: devopsfaith/krakend:2.7
    container_name: web-gateway
    command: ["run", "-d", "-c", "/etc/krakend/krakend.json"]
    ports:
      - "8080:8080"
    volumes:
      - ./gateways/web-gateway/krakend.json:/etc/krakend/krakend.json:ro
    depends_on:
      - qr-converter-service
    restart: unless-stopped

  mobile-gateway:
    build:
      context: ./gateways/mobile-gateway
      dockerfile: Dockerfile
    container_name: mobile-gateway
    ports:
      - "8090:8090"
    depends_on:
      - qr-converter-service
    restart: unless-stopped

  qr-converter-service:
    build:
      context: ./services/qr-converter-service
      dockerfile: Dockerfile
    container_name: qr-converter-service
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  upn-records-service:
    build:
      context: ./services/upn-records-service
      dockerfile: Dockerfile
    container_name: upn-records-service
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - DB_PATH=/data/upn-records.db
    volumes:
      - upn-records-data:/data
    restart: unless-stopped

volumes:
  upn-records-data:
